{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">
        My Wishlist
    </h2>

    <div class="row">

        {% for item in items %}

        <div class="col-md-3 mb-4">

            <div class="card">

                <img src="{{ item.product.image.url }}"
                     class="card-img-top"
                     style="height:250px; object-fit:cover;">

                <div class="card-body">

                    <h5>
                        {{ item.product.name }}
                    </h5>

                    <p class="text-success">
                        ₹ {{ item.product.price }}
                    </p>

                </div>

            </div>

        </div>

        {% empty %}

        <p>
            Wishlist is empty.
        </p>

        {% endfor %}

    </div>

</div>

{% endblock %}
