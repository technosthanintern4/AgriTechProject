{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row">

        <div class="col-md-6">

            {% if service.image %}
            <img
                src="{{ service.image.url }}"
                class="img-fluid rounded shadow"
            >
            {% endif %}

        </div>

        <div class="col-md-6">

            <h2>
                {{ service.title }}
            </h2>

            <hr>

            <p>
                {{ service.description }}
            </p>

            <div class="mt-4">
                <a href="{% url 'book_consultation' %}"
                   class="btn btn-success btn-lg d-inline-flex align-items-center shadow-sm">
                    <i class="fa-solid fa-calendar-check me-2"></i>
                    Book Consultation
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
