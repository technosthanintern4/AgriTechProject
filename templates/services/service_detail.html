{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row">

        <div class="col-md-6">

            {% if service.image %}
            <img
                src="{{ service.image.url }}"
                class="img-fluid rounded shadow"
            >
            {% endif %}

        </div>

        <div class="col-md-6">

            <h2>
                {{ service.title }}
            </h2>

            <hr>

            <p>
                {{ service.description }}
            </p>

            <a href="{% url 'service_list' %}"
               class="btn btn-success">
                Back to Services
            </a>

        </div>

    </div>

</div>

{% endblock %}
