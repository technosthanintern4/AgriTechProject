{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="row">

        <!-- Service Image -->
        <div class="col-md-6">

            {% if service.image %}
            <img
                src="{{ service.image.url }}"
                class="img-fluid rounded shadow"
                style="width:100%; max-height:500px; object-fit:cover;"
            >
            {% else %}
            <img
                src="https://via.placeholder.com/600x500"
                class="img-fluid rounded shadow"
            >
            {% endif %}

        </div>

        <!-- Service Information -->
        <div class="col-md-6">

            <h2 class="mb-3">

                {{ service.title }}

            </h2>

            <hr>

            <p class="text-muted">

                {{ service.description }}

            </p>

            <div class="mt-4">

                <a
                    href="{% url 'book_service' service.slug %}"
                    class="btn btn-success btn-lg">

                    Book Consultation

                </a>

            </div>

            <div class="mt-3">

                <a
                    href="{% url 'service_list' %}"
                    class="btn btn-outline-secondary">

                    ← Back to Services

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
