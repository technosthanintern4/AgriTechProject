{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="mb-3">
                        Book Plant Consultation
                    </h2>

                    <h4 class="text-success mb-4">
                        Doctor: {{ doctor.name }}
                    </h4>

                    {% if form.errors %}
                    <div class="alert alert-danger">

                        <strong>
                            Please fix the following errors:
                        </strong>

                        {{ form.errors }}

                    </div>
                    {% endif %}

                    <form method="POST"
                          enctype="multipart/form-data">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button type="submit"
                                class="btn btn-success">

                            Submit Request

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
