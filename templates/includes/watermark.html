<!-- Watermark Display Include -->
{% if site_settings.enable_watermark %}
    <div class="watermark {{ site_settings.watermark_position }}" style="opacity: {{ site_settings.watermark_opacity }};">
        {% if site_settings.watermark_video %}
            <!-- Video Watermark -->
            <video width="200" height="200" autoplay muted loop playsinline>
                <source src="{{ site_settings.watermark_video.url }}" type="video/mp4">
                <source src="{{ site_settings.watermark_video.url }}" type="video/webm">
                Your browser does not support the video tag.
            </video>
        {% elif site_settings.watermark_image %}
            <!-- Image Watermark -->
            <img src="{{ site_settings.watermark_image.url }}" alt="Watermark" title="AgriTech Watermark">
        {% endif %}
    </div>
{% endif %}
