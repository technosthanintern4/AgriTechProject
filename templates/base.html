<html lang="en">
<head>

          content="width=device-width, initial-scale=1.0">

    <title>AgriTech Nursery</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
