<!DOCTYPE html>
<html lang="en" class="h-100">
<head>

    {% load static %}

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AgroSthan</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        integrity="sha512-1M7yH+jfG7tqp9aVB5dKp67D+XF0TNA5KJYoGyCalx+9OQm8C8jWzjdbO0B4pX7Nw5+7CJUYdNcJzK7P7+Z1hA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Site Settings CSS -->
    <link rel="stylesheet" href="{% static 'css/site-settings.css' %}">

</head>

<body class="d-flex flex-column h-100" style="padding-top:56px;">

    <!-- Navbar -->
    {% include 'includes/navbar.html' %}

    <!-- Main Content -->
    <main class="flex-grow-1">
        {% block content %}
        {% endblock %}
    </main>

    <!-- Footer -->
    {% include 'includes/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
