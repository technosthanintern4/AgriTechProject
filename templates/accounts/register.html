{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <h2>Register</h2>

    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="btn btn-success">
            Register
        </button>

    </form>

</div>

{% endblock %}
